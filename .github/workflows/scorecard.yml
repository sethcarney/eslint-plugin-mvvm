name: OpenSSF Scorecard

on:
  push:
    branches: [master]
  schedule:
    # Weekly on Monday at 01:30 UTC
    - cron: "30 1 * * 1"

# Needed for both SARIF upload and OIDC token for publishing results
permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to the Code Scanning dashboard
      security-events: write
      # Required for private repos or to get better API limits on public repos
      # Replace GITHUB_TOKEN with a SCORECARD_TOKEN (classic PAT, public_repo scope)
      # for the best experience on public repositories.
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API for the badge and public dashboard.
          # Set to false to disable publishing (e.g. for private repos).
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
